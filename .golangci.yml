version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: internal/s3store/store\.go
        linters:
          - staticcheck
        text: "SA1019"

formatters:
  enable:
    - gofmt
