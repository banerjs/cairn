run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - gofmt

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - path: internal/s3store/store\.go
      linters:
        - staticcheck
      text: "SA1019"
